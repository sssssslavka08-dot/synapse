name: synapse
description: Intelligent language learning platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  path_provider: ^2.1.2
  easy_localization: ^3.0.3
  lottie: ^3.1.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.2
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  uuid: ^4.3.3
  intl: ^0.20.2

  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.1
  flutter_tts: ^4.0.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/lottie/
    - assets/fonts/
