name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'

      - name: Create secrets file
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'DART_EOF'
          const supabaseUrl = '${{ secrets.SUPABASE_URL }}';
          const supabaseAnonKey = '${{ secrets.SUPABASE_KEY }}';
          DART_EOF

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Setup release keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/release.keystore

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          flutter build apk --release \
            --dart-define=KEYSTORE_PATH=release.keystore \
            -P "android.injected.signing.store.file=$(pwd)/android/app/release.keystore" \
            -P "android.injected.signing.store.password=$KEYSTORE_PASSWORD" \
            -P "android.injected.signing.key.alias=$KEYSTORE_ALIAS" \
            -P "android.injected.signing.key.password=$KEYSTORE_PASSWORD"

      - name: Build App Bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          flutter build appbundle --release \
            -P "android.injected.signing.store.file=$(pwd)/android/app/release.keystore" \
            -P "android.injected.signing.store.password=$KEYSTORE_PASSWORD" \
            -P "android.injected.signing.key.alias=$KEYSTORE_ALIAS" \
            -P "android.injected.signing.key.password=$KEYSTORE_PASSWORD"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "SYNAPSE ${{ github.ref_name }}"
          body: |
            ## SYNAPSE ${{ github.ref_name }}

            ### Скачать
            - **Android APK** — скачай файл `app-release.apk` ниже
            - **iOS** — скоро в App Store

            ### Установка APK на Android
            1. Скачай `app-release.apk`
            2. Открой файл на телефоне
            3. Разреши установку из неизвестных источников
            4. Установить
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
